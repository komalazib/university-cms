<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styling.css">
    <title>CMS</title>
</head>
<body>
    <h1>GPA Calculator</h1>
    <div class="container">
        <input type="text" id="course" placeholder="Course Name">
        <input type="number" id="credits" placeholder="Credit Hours">
        <input type="number" id="grade" placeholder="Grade">

        <button id="addBtn">Add Course</button>
        <ul id="courseList"></ul>

        <h2>Your GPA:<span id="gpa">0.00</span></h2>
    </div>
<div class="card">
    <h3> Timetable Viewer (Editable)</h3>

    <input type="text" id="day" placeholder="Day (e.g. Monday)">
    <input type="text" id="subject" placeholder="Subject">
    <input type="text" id="time" placeholder="Time (e.g. 9:00 - 10:30)">

    <button id="addClassBtn">Add Class</button>

    <table class="timetable">
        <thead>
            <tr>
                <th>Day</th>
                <th>Subject</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody id="timetableBody">
        </tbody>
    </table>
</div>
    <script src="script.js"></script>
</body>
</html>
