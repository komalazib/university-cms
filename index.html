<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styling.css">
    <title>CMS</title>
</head>
<body>
    <h1>GPA Calculator</h1>
    <div class="container">
        <input type="text" id="course" placeholder="Course Name">
        <input type="number" id="credits" placeholder="Credit Hours">
        <input type="number" id="grade" placeholder="Grade">

        <button id="addBtn">Add Course</button>
        <ul id="courseList"></ul>

        <h2>Your GPA:<span id="gpa">0.00</span></h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
